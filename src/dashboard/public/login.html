<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - RyzarsAI Control Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
    }
    .login-card {
      background: rgba(30, 30, 50, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(120, 80, 255, 0.2);
      box-shadow: 0 0 60px rgba(120, 80, 255, 0.1);
    }
    .input-field {
      transition: all 0.3s ease;
    }
    .input-field:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
    }
    .glow-btn {
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
    }
    .glow-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(124, 58, 237, 0.4);
    }
    .glow-btn:active {
      transform: translateY(0);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .loading-dot {
      animation: pulse-dot 1.2s ease-in-out infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <div class="login-card rounded-3xl p-8 w-full max-w-md fade-in">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-purple-600 to-blue-600 mb-4 shadow-lg">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">RyzarsAI</h1>
      <p class="text-gray-400 text-sm mt-1">Control Panel v0.5.9</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-gray-300 text-sm font-medium mb-2">Username</label>
        <input
          id="username"
          type="text"
          autocomplete="username"
          placeholder="Masukkan username"
          class="input-field w-full bg-gray-900/60 border border-gray-600 text-white rounded-xl px-4 py-3 outline-none focus:border-purple-500"
          required
        />
      </div>

      <div>
        <label class="block text-gray-300 text-sm font-medium mb-2">Password</label>
        <input
          id="password"
          type="password"
          autocomplete="current-password"
          placeholder="Masukkan password"
          class="input-field w-full bg-gray-900/60 border border-gray-600 text-white rounded-xl px-4 py-3 outline-none focus:border-purple-500"
          required
        />
      </div>

      <div id="errorMessage" class="hidden text-red-400 text-sm text-center bg-red-900/20 border border-red-500/30 rounded-xl px-4 py-3"></div>

      <button id="loginBtn" type="submit" class="glow-btn w-full text-white font-bold py-3 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
        <span id="btnText">Masuk</span>
        <span id="btnLoader" class="hidden flex items-center gap-1">
          <span class="loading-dot w-2 h-2 bg-white rounded-full inline-block"></span>
          <span class="loading-dot w-2 h-2 bg-white rounded-full inline-block"></span>
          <span class="loading-dot w-2 h-2 bg-white rounded-full inline-block"></span>
        </span>
      </button>
    </form>

    <p class="text-gray-600 text-xs text-center mt-6">
      &copy; 2026 RyzarsAI — All rights reserved
    </p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const errorMsg = document.getElementById('errorMessage');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('hidden');

      btnText.classList.add('hidden');
      btnLoader.classList.remove('hidden');
      loginBtn.disabled = true;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: username.value.trim(),
            password: password.value.trim()
          })
        });

        const data = await res.json();

        if (data.success) {
          window.location.href = data.redirect || '/dashboard';
        } else {
          errorMsg.textContent = data.message || 'Login gagal';
          errorMsg.classList.remove('hidden');
        }
      } catch (err) {
        errorMsg.textContent = 'Gagal terhubung ke server';
        errorMsg.classList.remove('hidden');
      } finally {
        btnText.classList.remove('hidden');
        btnLoader.classList.add('hidden');
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
